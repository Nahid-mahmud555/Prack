<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER ROBOT X</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}

body{
    overflow:hidden;
    background:#000;
    color:white;
}

canvas{
    position:fixed;
    top:0;
    left:0;
}

.overlay{
    position:absolute;
    z-index:100;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    background:linear-gradient(
        rgba(0,0,0,.2),
        rgba(0,0,0,.4)
    );
}

.logo{
    font-size:5rem;
    font-weight:900;
    letter-spacing:4px;
    color:#00ffff;
    text-shadow:
    0 0 10px #00ffff,
    0 0 30px #00ffff,
    0 0 60px #00ffff;
}

.subtitle{
    margin-top:15px;
    font-size:1.2rem;
    color:#d9ffff;
    max-width:700px;
    line-height:1.7;
}

button{
    margin-top:30px;
    padding:14px 30px;
    border:none;
    border-radius:12px;
    background:#00ffff;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 0 20px cyan;
}

.status{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    color:#7ffcff;
    font-size:.9rem;
    opacity:.8;
}
</style>

<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

<script type="importmap">
{
"imports":{
"three":"https://unpkg.com/three@0.165.0/build/three.module.js"
}
}
</script>
</head>

<body>

<div class="overlay">
    <div class="logo">CYBER ROBOT X</div>

    <p class="subtitle">
        Advanced Autonomous Intelligence Interface.
        A futuristic robotic visualization powered by
        real-time 3D rendering technology.
    </p>

    <button onclick="alert('System Activated 🤖')">
        INITIALIZE SYSTEM
    </button>

    <div class="status">
        STATUS • ONLINE • AI CORE ACTIVE
    </div>
</div>

<canvas id="bg"></canvas>

<script type="module">
import * as THREE from "three";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({
canvas:document.querySelector("#bg"),
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.setPixelRatio(window.devicePixelRatio);

camera.position.z = 8;

/* LIGHTS */

const pointLight = new THREE.PointLight(
0x00ffff,
5
);

pointLight.position.set(
5,
5,
5
);

scene.add(pointLight);

scene.add(
new THREE.AmbientLight(
0xffffff,
1
)
);

/* ROBOT HEAD */

const head = new THREE.Mesh(
new THREE.BoxGeometry(2,2,2),
new THREE.MeshStandardMaterial({
color:0x101010,
emissive:0x00ffff,
emissiveIntensity:.4
})
);

scene.add(head);

/* EYES */

const eyeMaterial =
new THREE.MeshBasicMaterial({
color:0x00ffff
});

const eye1 = new THREE.Mesh(
new THREE.SphereGeometry(.15,32,32),
eyeMaterial
);

eye1.position.set(-0.5,0.2,1.05);

const eye2 = eye1.clone();
eye2.position.x = 0.5;

scene.add(eye1);
scene.add(eye2);

/* BODY */

const body = new THREE.Mesh(
new THREE.BoxGeometry(
2.5,
3,
1.5
),
new THREE.MeshStandardMaterial({
color:0x181818,
emissive:0x00ffff,
emissiveIntensity:.2
})
);

body.position.y = -3;

scene.add(body);

/* STARS */

for(let i=0;i<600;i++){

const star = new THREE.Mesh(
new THREE.SphereGeometry(.03),
new THREE.MeshBasicMaterial({
color:0xffffff
})
);

star.position.set(
(Math.random()-0.5)*60,
(Math.random()-0.5)*60,
(Math.random()-0.5)*60
);

scene.add(star);
}

function animate(){

requestAnimationFrame(animate);

head.rotation.y += 0.01;
body.rotation.y += 0.008;

eye1.scale.y =
1 + Math.sin(Date.now()*0.005)*0.2;

eye2.scale.y =
1 + Math.sin(Date.now()*0.005)*0.2;

renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{

camera.aspect =
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});
</script>

</body>
</html>
